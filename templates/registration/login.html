{% extends "base.html" %}
{% load crispy_forms_tags i18n %}

{% block content %}
    <h1>{% translate "Login" %}</h1>

    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}

        <button type="submit" class="btn btn-primary">{% translate "Login" %}</button>
    </form>
{% endblock %}
