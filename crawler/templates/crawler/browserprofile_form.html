{% extends "base.html" %}
{% load i18n crispy_forms_tags %}

{% block content %}
    <h1>{{ heading }}</h1>

    <form method="post" {% if multipart %}enctype="multipart/form-data"{% endif %} class="mt-4 mb-5">
        {% csrf_token %}
        {% crispy form %}

        <div class="d-flex justify-content-end gap-2">
            <a href="{% url 'browser_profile_list' %}" class="btn btn-secondary">{% translate 'Cancel' %}</a>
            <button type="submit" class="btn btn-primary">{% translate 'Save' %}</button>
        </div>
    </form>
{% endblock %}
